name: Continuous Integration

on:
  push:
    branches: [ "master" ]
  pull_request:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  rust_stable: stable
  rust_min: '1.85'

jobs:
  
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
      - name: Build workspace
        run: cargo build --verbose --workspace --all-features

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
          components: rustfmt
      - name: Check code formatting
        run: cargo fmt --all -- --check

  cargo-sort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
      - name: Install cargo-sort
        run: cargo install cargo-sort
      - name: Check Cargo.toml sorting
        run: cargo sort --workspace --check
  
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
          components: clippy
      - name: Check lint
        run: |
          cargo clippy --workspace --all-features --all-targets -- \
            -D warnings \
            -D clippy::expect_used \
            -D clippy::unreachable \
            -D clippy::arithmetic_side_effects \
            -D clippy::unwrap_used \
            -D clippy::todo \
            -D clippy::redundant_clone \
            -D clippy::unimplemented \
            -D clippy::missing_panics_doc \
            -D clippy::redundant_field_names

  docs:
    name: Check documentation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [huginn-net-db, huginn-net-tls, huginn-net-tcp, huginn-net-http, huginn-net]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Check documentation for ${{ matrix.crate }}
        env:
          RUSTDOCFLAGS: "-D warnings --cfg docsrs"
        run: cargo +nightly doc --no-deps -p ${{ matrix.crate }} --all-features

  test-individual-crates:
    name: Test individual crates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [huginn-net-db, huginn-net-tls, huginn-net-tcp, huginn-net-http, huginn-net]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
      - name: Test ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --all-features
      - name: Check ${{ matrix.crate }}
        run: cargo check -p ${{ matrix.crate }} --all-features

  minrust:
    name: minrust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_min }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_min }}
      - name: Check MSRV
        run: cargo check --workspace --all-features

  examples-and-benchmarks:
    name: Examples and benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
      - name: Check examples
        run: cargo check --examples -p huginn-net
      - name: Check benchmarks
        run: cargo check --benches -p huginn-net

  # Validates every meaningful feature combination of `huginn-net-tcp` to
  # guarantee that disabling any feature still produces a clean (warning-free)
  # library build. The full-features combo additionally runs the test and
  # bench-link steps.
  tcp-feature-matrix:
    name: TCP feature matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          # Single features
          - ""
          - "syn"
          - "syn-ack"
          - "mtu"
          - "uptime"
          # Useful pairs
          - "syn,syn-ack"
          - "syn,mtu"
          - "syn,uptime"
          - "syn-ack,mtu"
          - "syn-ack,uptime"
          - "mtu,uptime"
          # Three-feature combos
          - "syn,syn-ack,mtu"
          - "syn,syn-ack,uptime"
          - "syn,mtu,uptime"
          - "syn-ack,mtu,uptime"
          # All features (equivalent to default)
          - "syn,syn-ack,mtu,uptime"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust ${{ env.rust_stable }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_stable }}
          components: clippy
      - name: Build huginn-net-tcp (features='${{ matrix.features }}')
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build -p huginn-net-tcp --no-default-features --lib
          else
            cargo build -p huginn-net-tcp --no-default-features \
              --features "${{ matrix.features }}" --lib
          fi
      - name: Clippy huginn-net-tcp (features='${{ matrix.features }}')
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo clippy -p huginn-net-tcp --no-default-features --lib -- -D warnings
          else
            cargo clippy -p huginn-net-tcp --no-default-features \
              --features "${{ matrix.features }}" --lib -- -D warnings
          fi
      - name: Tests + bench link (full combo only)
        if: matrix.features == 'syn,syn-ack,mtu,uptime'
        run: |
          cargo test  -p huginn-net-tcp --no-default-features \
            --features "${{ matrix.features }}" --tests
          cargo bench -p huginn-net-tcp --no-default-features \
            --features "${{ matrix.features }}" --no-run

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@v6
      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --workspace --verbose --all-features --timeout 120 --out xml --output-dir .
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
